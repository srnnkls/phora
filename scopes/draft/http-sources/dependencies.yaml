scope: http-sources

# Soft coordination (not a hard build dependency): host-alias-sources also edits
# Source mode-exclusivity. Land the validation change once, three-way.
coordination:
  - scope: host-alias-sources
    overlap: "Source mode-exclusivity validation (git XOR host+path XOR url)"

phases:
  - id: phase-1-config
    title: "Config"
    tasks: [HTP-001]

  - id: phase-2-fetch
    title: "Download + verify"
    tasks: [HTP-002]

  - id: phase-3-extract
    title: "Extract + strip"
    tasks: [HTP-003]
    depends_on: [HTP-002]

  - id: phase-4-import
    title: "Synthetic-commit import (spike first)"
    tasks: [HTP-004]
    depends_on: [HTP-003]

  - id: phase-5-backend
    title: "HttpBackend + router"
    tasks: [HTP-005]
    depends_on: [HTP-001, HTP-004]

  - id: phase-6-lock-docs
    title: "Lock + docs"
    parallel: true
    tasks: [HTP-006, HTP-007]
    depends_on: [HTP-005]

edges:
  HTP-003: [HTP-002]
  HTP-004: [HTP-003]
  HTP-005: [HTP-001, HTP-004]
  HTP-006: [HTP-005]
  HTP-007: [HTP-005]

critical_path: [HTP-002, HTP-003, HTP-004, HTP-005, HTP-006]
