scope: http-sources
issue_type: Feature
created: 2026-06-08
revised: 2026-06-08   # post multi-agent review (opus+sonnet)

tasks:
  - id: HTP-001
    content: "Config: url + digest fields, three-way mode exclusivity, source-url accessor, refspec/root rejection"
    status: done
    activeForm: "Adding url source config"
    review_fixes:
      - "CRITICAL (silent dual-mode): Config::parse must reject >1 of {git, host+path, url}; today only branch/tag/rev>1 is checked (config.rs:33)"
      - "HIGH (git→Option ripple, shared with host-alias): `git` is a required String read as `url` at 11+ sites. Add Source::source_url(&self)->&str accessor; make git Option; mode-aware merged_with"
      - "MEDIUM (root): reject `root` on a url source (archive is pre-stripped); reject branch/tag/rev on url"
      - "MEDIUM (download digest is NOT registry::Digest): registry::Digest is blake3-only and feeds projection verify — do NOT widen it. Add a separate DownloadDigest { Sha256 | Blake3 } parser"
    acceptance:
      - "Source gains url: Option<String>, digest: Option<String>; git becomes Option<String>; deny_unknown_fields holds"
      - "Mode exclusivity (git XOR host+path XOR url) — single Source::mode()/validate in Config::parse"
      - "branch/tag/rev/root on a url source => error"
      - "digest parses via a NEW DownloadDigest type (sha256/blake3), separate from registry::Digest"
    tests:
      - "url-only parses; url+git rejected; url+branch rejected; url+root rejected"
      - "DownloadDigest sha256:/blake3: parse; registry::Digest stays blake3-only (untouched)"

  - id: HTP-002
    content: "Deps + download + optional digest verification"
    status: done
    activeForm: "Implementing download + verify"
    review_fixes:
      - "MEDIUM (TLS dedup): align the http client's TLS with gix's stack — gix uses blocking-network-client; pick ureq/reqwest with rustls features that dedupe (cargo tree -e features | grep tls)"
    acceptance:
      - "Add deps: http client (rustls-aligned), flate2, tar, zip, sha2 (blake3 present)"
      - "Stream download to a temp file; non-2xx/network => clear error"
      - "If digest set, verify the raw download (DownloadDigest) BEFORE extraction; mismatch => error (expected vs actual)"
    tests:
      - "local fixture URL downloads; non-2xx errors; matching/ mismatching digest pass/fail pre-extract"

  - id: HTP-003
    content: "Archive extraction + auto-strip + per-segment traversal guard"
    status: pending
    activeForm: "Extracting archives safely"
    depends_on: [HTP-002]
    review_fixes:
      - "CRITICAL: safe_component (source.rs:542) guards a SINGLE component and rejects '/'. Archive entries are multi-segment paths — add safe_archive_path(): split on '/', run safe_component per segment, reject absolute/drive-root/null/backslash; do NOT pass whole paths to safe_component"
      - "MEDIUM (non-utf8): archive names may be non-utf8 (git filenames are BString; safe_component takes &str) — reject non-utf8 names with a clear error in v1"
      - "MEDIUM (modes): map tar/zip exec bits + symlinks to git EntryKind so ExportPolicy (allow_symlinks/preserve_executable) applies in HTP-004"
    acceptance:
      - "Detect+extract tar, tar.gz/tgz, zip; raw file => one-entry tree named from URL basename"
      - "Auto-strip exactly one top-level dir when the archive has a single top dir; else no strip"
      - "safe_archive_path rejects ../, absolute, drive-root, backslash, null; nested-safe a/b/c passes"
      - "exec bit + symlink entries carry through to EntryKind; non-utf8 name => error"
    tests:
      - "each format extracts; raw => single entry; single-top-dir stripped, multi-top NOT stripped"
      - "a/b/c passes; a/../b, /abs, ..\\b, null => rejected; non-utf8 name rejected"

  - id: HTP-004
    content: "Deterministic synthetic-commit import (gix) — confirmed feasible, mind tree-sort"
    status: pending
    activeForm: "Importing content as a synthetic commit"
    depends_on: [HTP-003]
    review_fixes:
      - "CONFIRMED (opus, against gix-0.84/gix-object): commit_as pins author+committer+time (SignatureRef.time is raw \"0 +0000\"), write_blob/write_object give content-only ids. Keep the gate but it is not a true unknown."
      - "CRITICAL determinism caveat: gix Tree.entries MUST be sorted by git tree order (debug_assert in tree/write.rs); sort before write or release builds emit unstable/malformed trees"
      - "MEDIUM (mtime sentinel): use epoch+1 (not 0) OR test mtime round-trip — some filesystems (HFS+/FAT32) clamp mtime 0, which would make every clean check report Modified"
    acceptance:
      - "Import the extracted tree into ~/.phora/git/<MirrorKey>.git (MirrorKey = blake3(NormalizedUrl)); build blobs/trees via gix; commit_as with fixed identity + fixed time + constant message + no parents"
      - "Tree entries sorted in git order before write; commit id = f(content only)"
      - "Map exec/symlink EntryKind; point refs/heads/phora at the commit; commit_time sentinel (epoch+1)"
    tests:
      - "same inner content (different outer dir) => identical commit id; different content => different id"
      - "git fsck / cat-file accepts the synthetic commit (catches tree-sort errors)"
      - "import twice => identical id across fresh repos"

  - id: HTP-005
    content: "HttpBackend + mode-aware backend router; url-aware resolve"
    status: pending
    activeForm: "Implementing HttpBackend and routing"
    depends_on: [HTP-001, HTP-004]
    review_fixes:
      - "CRITICAL (router dispatch): do NOT dispatch on url scheme — a git source legitimately uses https://…​.git. RouterBackend dispatches on SOURCE MODE via the `source` NAME param (trait passes source name): construct it with a name→mode map; keep sync(&dyn SourceBackend) intact"
      - "CRITICAL (refspec mismatch): resolve_sources passes source.refspec() = Branch(\"main\") by default; HttpBackend.resolve would look up refs/heads/main not /phora. Add Refspec::None (or make refspec() url-aware); HttpBackend.resolve ignores the refspec and reads refs/heads/phora"
    acceptance:
      - "HttpBackend: fetch = download+verify+extract+strip+import; resolve = read refs/heads/phora (ignores refspec); commit_time = epoch+1"
      - "discover_artifacts/export_artifact/compute_digest reuse the shared git-tree logic"
      - "RouterBackend (src/backend.rs) holds Git+Http backends + a source-name→mode map; dispatches per call on source name; sync/rebuild signatures unchanged (&dyn SourceBackend)"
      - "url sources carry a non-default refspec (Refspec::None) so they never resolve refs/heads/main"
    tests:
      - "end-to-end: url tarball source syncs/deploys/verifies like a git source"
      - "a git source with an https://…​.git url routes to GitBackend (NOT HttpBackend); both in one config deploy"

  - id: HTP-006
    content: "Lock + content identity for url sources"
    status: pending
    activeForm: "Locking url sources by content"
    depends_on: [HTP-005]
    review_fixes:
      - "HIGH (LockedSource shape): for a url source set git=url, resolved=sentinel (e.g. \"url\"), commit=synthetic id; source_matches compares the url + synthetic identity. Document the url source's lock fields"
      - "MEDIUM (no-op model): plain sync does NOT re-download (lock pins the synthetic commit, like git); only update/force re-downloads — state this explicitly"
    acceptance:
      - "LockedSource pins the synthetic commit + the url; resolved field documented for url sources"
      - "plain sync of unchanged content = no-op (no re-download); update re-downloads, lock advances only if content changed (identical bytes => identical synthetic id => no churn)"
    tests:
      - "second sync no-op; update with changed fixture advances; update with identical bytes does not churn"

  - id: HTP-007
    content: "Docs + example for url sources"
    status: pending
    activeForm: "Documenting url sources"
    depends_on: [HTP-005]
    acceptance:
      - "README + phora.example.toml document url sources, DownloadDigest (algo-prefixed), formats, auto-strip, determinism, the epoch-sentinel mtime"
