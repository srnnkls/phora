scope: http-sources

batch_reviews:
  - batch: 3
    tasks: [HTP-003]
    phase_a5_test_review:
      reviewers: [opus, sonnet]
      outcome: changes_requested_then_clean
      fixed:
        - "added zip exec/symlink mapping tests (zip uses external attrs, separate code path)"
        - "added single-top-level-FILE no-strip test"
        - "added mid-path + zip traversal rejection tests"
        - "fixture fix: tar 0.4.46 rejects '..' at write time -> built malicious tar via raw GnuHeader.name bytes"
    phase_c_code_review:
      reviewers:
        - { id: general-opus, verdict: approved, gates: { correctness: pass, security: pass, performance: fail } }
        - { id: general-sonnet, verdict: approved, gates: { correctness: pass, security: pass, performance: pass } }
        - { id: architecture-opus, verdict: approved, gates: { architecture: pass } }
        - { id: compliance-sonnet, verdict: changes_requested, gates: { style: fail } }
      synthesized:
        gates: { correctness: pass, security: pass, performance: pass, architecture: pass, style: pass }
        outcome: approved_after_fixes
    issues_fixed:
      high:
        - id: B3-decompression-bomb
          found_by: [general-opus, general-sonnet]
          detail: "no size cap on fs::read + per-entry read_to_end + gzip/zip -> bomb OOM"
          resolution: "MAX_EXTRACTED_BYTES=1GiB; read_capped tracks actual bytes across tar+zip, errors on exceed. Test extract_rejects_archive_exceeding_size_cap"
        - id: B3-fmt
          found_by: [compliance-sonnet]
          detail: "test module import order + write_tar not rustfmt-canonical (CI fmt --check fails)"
          resolution: "rustfmt --edition 2024 src/archive.rs (formatting only)"
      low:
        - id: B3-raw-basename
          found_by: [general-sonnet]
          detail: "raw_entry built path from url basename unvalidated (url .../.. -> traversal)"
          resolution: "raw_entry fallible, runs basename through safe_archive_path. Test extract_rejects_raw_url_with_unsafe_basename"
        - id: B3-safe-component-doc
          found_by: [compliance-sonnet]
          detail: "safe_component doc said 'git tree filename'; now shared with archives"
          resolution: "broadened doc to git tree OR archive"
    deferred_issues:
      - id: B3-symlink-target-unvalidated
        severity: low
        found_by: [general-opus, general-sonnet]
        detail: "symlink targets stored verbatim as Link data, not validated"
        resolution: "matches existing GitBackend; materialization gated by ExportPolicy.allow_symlinks (default false). Materialization-layer concern, not archive.rs."
        carry_to: HTP-005
      - id: B3-arch-prefs
        severity: low
        found_by: [architecture-opus]
        detail: "extract(url) param used only on raw branch; safe_component could live in paths.rs; whole-archive-in-RAM for huge assets"
        resolution: "low quality preferences; deferred (v1 scope is config/dotfile + release assets)"
  - batch: 2
    tasks: [HTP-002]
    phase_a5_test_review:
      reviewers: [opus, sonnet]
      outcome: changes_requested_then_clean
      fixed:
        - "dead_port() TOCTOU race -> deterministic 127.0.0.1:1 connection-refused"
        - "blake3 fixture self-check split into its own test (triage clarity)"
        - "added blake3 mismatch test (opus coverage gap)"
    phase_c_code_review:
      reviewers:
        - { id: general-opus, verdict: approved, gates: { correctness: pass, security: pass, performance: pass } }
        - { id: general-sonnet, verdict: changes_requested, gates: { correctness: pass, security: pass, performance: fail } }
        - { id: architecture-opus, verdict: approved, gates: { architecture: pass } }
        - { id: compliance-sonnet, verdict: approved, gates: { style: pass } }
      synthesized:
        gates: { correctness: pass, security: pass, performance: pass, architecture: pass, style: pass }
        outcome: approved_after_fixes
    issues_fixed:
      medium:
        - id: B2-body-timeout
          found_by: [general-opus, general-sonnet]
          detail: "timeout_recv_response covers only headers; streamed body io::copy had no timeout -> stalling server wedges caller"
          resolution: "added timeout_recv_body (BODY_TIMEOUT); kept connect timeout"
      low:
        - id: B2-error-surface
          found_by: [general-opus, general-sonnet]
          detail: "File::create / io::copy errors surfaced as Error::Io; partial dest left on error"
          resolution: "map_err to Error::Source naming url+dest; remove partial dest on error. Regression test download_to_unwritable_dest_errors_as_source"
        - id: B2-comment-narration
          found_by: [compliance-sonnet]
          detail: "3-line CannedServer narration comment"
          resolution: "collapsed to one line"
    deferred_issues:
      - id: HTP-005-verify-streaming
        severity: medium
        found_by: [architecture-opus]
        detail: "verify_digest(&[u8]) vs disk-streamed download -> HTP-005 would re-read whole archive to hash"
        carry_to: HTP-005
        recommendation: "add verify_file(path,&DownloadDigest) streaming the file through the hasher, OR hash-while-download; keep verify_digest(&[u8]) for in-memory callers"
      - id: B2-ssrf-redirect
        severity: low
        found_by: [general-opus, architecture-opus]
        detail: "download follows up to 10 redirects with no host allow/deny -> SSRF if url/redirect points internal"
        resolution: "accepted v1 trust assumption (operator-controlled public url; auth out of scope). TLS verification confirmed ON; auth headers stripped on redirect (ureq default Never)."
      - id: B2-deps-unused
        severity: low
        found_by: [architecture-opus]
        detail: "flate2/tar/zip declared but unused until HTP-003"
        resolution: "task-mandated dep batching in HTP-002; first import in HTP-003 clears it"
  - batch: 1
    tasks: [HTP-001]
    phase_a5_test_review:
      reviewers: [opus, sonnet]
      outcome: changes_requested_then_clean
      fixed:
        - "blake3 digest test fixture was 65 chars (odd, undecodable) + mismatched byte array — corrected to deadbeef*8 / matching [u8;32]"
        - "url+tag / url+rev rejection tests tightened to assert error names the source (consistency with branch/root)"
    phase_c_code_review:
      reviewers:
        - id: general-opus
          verdict: approved
          gates: { correctness: pass, security: pass, performance: pass }
        - id: general-sonnet
          verdict: changes_requested
          gates: { correctness: fail, security: pass, performance: pass }
        - id: architecture-opus
          verdict: approved
          gates: { architecture: pass }
        - id: compliance-sonnet
          verdict: changes_requested
          gates: { style: fail }
      synthesized:
        gates: { correctness: pass, security: pass, performance: pass, architecture: pass, style: pass }
        outcome: approved_after_fixes
issues:
  high:
    - id: B1-merge-stale-refspec
      found_by: [general-sonnet, architecture-opus]
      detail: "merged_with left stale branch/tag/rev/root (and digest) when a local layer switched a source into url mode; validate() did not re-check url+refspec post-merge"
      resolution: "url arm of merged_with clears branch/tag/rev/root; git/host arms clear digest; validate() rejects url-mode source carrying branch/tag/rev/root. Regression tests added."
  medium:
    - id: B1-empty-url
      found_by: [general-sonnet]
      detail: "url = \"\" accepted by parse and validate"
      resolution: "empty/whitespace url rejected in both parse and validate, naming the source. Test added."
  low:
    - id: B1-clippy-format
      found_by: [compliance-sonnet]
      detail: "useless format! in download_digest_rejects_unknown_algo_prefix test"
      resolution: "replaced &format!(\"{hex}\") with hex"
deferred_issues:
  - id: HTP-005-resolved-remote-url-arm
    severity: high-latent
    found_by: [architecture-opus]
    detail: "resolved_remote() has no url arm — a config-valid url source would resolve to https://github.com/.git and get git-fetched. No url consumer exists yet (gate passed)."
    carry_to: HTP-005
    recommendation: "Introduce Source::mode() -> {Git,Host,Url}; resolved_remote errors (or callers branch) for url-mode; collapses scattered is_some() checks into one exhaustive switch."
  - id: HTP-002-downloaddigest-algo-accessor
    severity: low
    found_by: [architecture-opus]
    detail: "DownloadDigest::bytes() erases width/algo; consider an algo() accessor so HTP-002 verifier branches on algorithm without matching the enum twice."
    carry_to: HTP-002
style_decisions:
  - "Kept Source::source_url() name (scope-mandated; HTP-005 + frozen tests depend on it) despite compliance suggestion to rename to url()."
  - "Kept DownloadDigest # Errors rustdoc — consistent with existing codebase doc sections."
