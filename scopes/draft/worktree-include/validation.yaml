scope: worktree-include
issue_type: Feature
created: 2026-06-07
depends_on_scope: deploy-link-dev-mode

ambiguity_scan:
  scope:        clear     # symlink/copy back-references into primary; submodules explicitly excluded
  behavior:     clear     # idempotent apply, merge overlay, modes defined
  data_model:   clear     # [worktree].includes = [{ path, mode }]; stateless (no registry)
  constraints:  clear     # primary no-op, tracked-path refusal, absolute symlinks, warn-and-continue
  edge_cases:   partial   # missing primary path, stale link, tracked-path covered; primary that is itself a linked worktree (nested) and primary-relocation left to implementation
  integration:  clear     # reuses deploy-link primitive; post-checkout hook; phora.local.toml overlay
  terminology:  clear     # "include", "primary worktree", "apply" defined in scope.md

decisions:
  - id: submodules
    question: "How to handle submodule-walk entries?"
    resolution: "Dropped. phora replaces submodules; declare them as phora sources instead. No submodule mode."
    confirmed_by: user
  - id: structure
    question: "Relation to deploy-link-dev-mode?"
    resolution: "DECOUPLED (post-review H1). Own IncludeMode + own ~5-line atomic placement helper; reuse only projection::copy_file. No dependency on deploy-link's draft tasks."
    confirmed_by: user
    superseded: "Earlier 'reuses DLD-001/DLD-004' — enums differ, primitive is tiny"
  - id: config
    question: "How to ingest the manifest? Where does it live?"
    resolution: "Native [worktree] config; BOTH committed phora.toml (base) + phora.local.toml (overlay), so a fresh worktree has the manifest at apply time. Drop .worktreeinclude (import-legacy aids migration)."
    confirmed_by: user
  - id: tracked-guard
    question: "How to implement the refuse-tracked-path guard?"
    resolution: "Real gix index check (own task WTI-006); untracked-but-present .codex/*.local.toml read as absent"
    confirmed_by: user
  - id: trigger
    question: "What triggers population?"
    resolution: "post-checkout hook invokes `phora worktree apply` (no phora-side git wrapper, no sync-detect)"
    confirmed_by: user
  - id: state
    question: "Track includes in the registry?"
    resolution: "No — stateless/idempotent; cleaned up by git worktree remove"
    confirmed_by: assistant-default
  - id: symlink-style
    question: "Absolute or relative symlink targets?"
    resolution: "Absolute (matches current git-worktreeinclude output); relative is future work"
    confirmed_by: assistant-default

open_risks:
  - id: nested-worktree
    description: "If the primary is itself a linked worktree, target resolution could chain"
    resolution: "Always resolve to the true primary (main) worktree via git common-dir; pin with a test"
  - id: primary-relocation
    description: "Absolute symlinks break if the repo dir is moved/renamed"
    resolution: "v1 accepts this (same as today); document; relative targets are the future fix"
  - id: copy-mode-staleness
    description: "copy-mode entries do not auto-update when primary changes (unlike symlink)"
    resolution: "Re-apply refreshes copies; document the symlink-vs-copy update semantics"

review_config:
  reviewers: [opus, sonnet]
  note: "Highest-value review targets: primary-worktree detection correctness and the tracked-path refusal guard"

verification_gate:
  - "cargo test green incl. new worktree tests"
  - "CI acceptance oracle: tempdir primary+linked worktrees, phora worktree apply asserts exact symlink targets + idempotence + tracked-path refusal + missing-primary warn"
  - "arvato smoke (post-merge, not a gate): hook swap reproduces git-worktreeinclude symlinks"
  - ".worktreeinclude removed after import-legacy; submodule entries reframed as phora sources"

review_session:
  date: 2026-06-07
  reviewers: [claude-opus, claude-sonnet]
  gate_summary:
    completeness: address
    consistency: address
    feasibility: address
    clarity: address
  recommendation: address_issues
  findings:
    - id: H1
      severity: high
      found_by: [claude-opus, claude-sonnet]
      area: integration
      issue: "Cross-scope dependency illusory: DeployMode{Copy,Link} != IncludeMode{Symlink,Copy}; primitive is ~5 lines; both depended-on tasks unbuilt"
      resolution: "Decoupled; own IncludeMode + placement helper (user-confirmed)"
    - id: H2
      severity: high
      found_by: [claude-opus]
      area: data_model
      issue: "phora.local.toml read from the linked worktree's CWD, but a gitignored local file isn't checked out into a fresh worktree -> motivating local-only includes silently no-op"
      resolution: "Manifest lives in committed phora.toml (base) + local overlay (user-confirmed)"
    - id: H3
      severity: high
      found_by: [claude-opus, claude-sonnet]
      area: constraints
      issue: "Refuse-tracked-path needs git index access; phora has none today (pure ODB export)"
      resolution: "WTI-006: dedicated gix-index task (feasible; gix default features compile gix-index)"
    - id: H4
      severity: high
      found_by: [claude-sonnet]
      area: edge_cases
      issue: "Nested child include path inside a real dir (.cmw.local/config.yaml) — parent creation + non-clobber unspecified"
      resolution: "WTI-003: create parents, link only the leaf, preserve siblings + test"
    - id: M_detect
      severity: medium
      found_by: [claude-opus]
      area: feasibility
      issue: "Scope proposed `git worktree list` shell-out; codebase is pure-gix"
      resolution: "WTI-002: gix discover + main_repo().work_dir(); handle bare main repo"
    - id: M_state
      severity: medium
      found_by: [claude-opus]
      area: integration
      issue: "Habit risk: apply might open a per-worktree registry + state.lock"
      resolution: "WTI-003: apply opens no registry/lock; test nothing under ~/.phora/state"
    - id: M_journal
      severity: medium
      found_by: [claude-opus, claude-sonnet]
      area: constraints
      issue: "Existing journalled swap is registry-coupled; stateless re-apply self-heals"
      resolution: "WTI-003: lean temp+rename helper, no journal"
    - id: M_windows_dir
      severity: medium
      found_by: [claude-sonnet]
      area: constraints
      issue: "Directory targets need symlink_dir; copy of a dir needs copy_tree"
      resolution: "WTI-003: file-vs-dir aware symlink/copy"
    - id: M_oracle
      severity: medium
      found_by: [claude-sonnet]
      area: clarity
      issue: "Manual arvato cutover is not an objective CI gate"
      resolution: "Verification: tempdir integration test is the oracle; arvato is smoke"
    - id: M_cli
      severity: medium
      found_by: [claude-sonnet]
      area: clarity
      issue: "CLI has no subcommand nesting; import-legacy nesting unspecified"
      resolution: "WTI-005: Worktree subcommand enum { Apply, ImportLegacy }"
