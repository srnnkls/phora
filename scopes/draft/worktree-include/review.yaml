scope: worktree-include
batch_reviews:
  - batch: 1
    tasks: [WTI-001]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "interior `..` traversal not pinned (leading-only) -> added interior_traversal_include_path_is_rejected"
        - "loose Err(Error::Config(_)) matching -> tightened to assert msg names offending path"
        - "empty local includes=[] replace not pinned -> added merge_local_empty_worktree_includes_clears_base"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet]
      gates:
        correctness: pass   # after fixes
        security: pass
        architecture: pass
        style: pass
      outcome: changes_requested -> approved
      issues_resolved:
        - severity: medium
          gate: correctness
          detail: "empty path \"\" and `.`/CurDir include paths were accepted; a lone `.` would symlink the whole worktree root at apply"
          fix: "reject empty path; reject any `.` segment (raw-segment scan, since Path::components() normalizes interior `.` away); 3 new tests"
        - severity: low
          gate: architecture
          detail: "merge inlined instead of WorktreeConfig::merged_with (scope review_fix K-003 specified the method)"
          fix: "added WorktreeConfig::merged_with (wholesale replace); merge_configs uses the sibling Some/None match shape"
    deferred_issues:
      - severity: medium
        gate: security
        detail: "path guard uses std::path semantics; Windows-separator/drive/UNC paths (C:\\, \\\\server, sub\\..\\..) parse as single opaque components on this Unix target and bypass absolute/.. checks. Benign on Unix; real containment is apply-time canonicalization."
        owner: WTI-003 / WTI-006
      - severity: low
        gate: security
        detail: "parse-time string validation cannot guarantee worktree-root containment against symlink-component escapes; enforce at apply time via canonicalize + root-prefix assertion."
        owner: WTI-003
    verification:
      lib_tests: "289 passed; 0 failed"
      clippy_all_targets: clean
      fmt: clean
  - batch: 2
    tasks: [WTI-002]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "error tests asserted Display substrings -> added Error::Worktree(String) variant; assert matches!(Error::Worktree(_)) + disjoint substring to distinguish bare vs not-a-repo"
        - "nested-subdir fixture used a non-canonical start path -> canonicalize the fixture path (macOS /var vs /private/var)"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet]
      gates: { correctness: pass, security: pass, architecture: pass, style: pass }
      outcome: approved   # both reviewers
      low_findings_handled:
        - "# Errors doc omitted canonicalize-failure path -> doc bullet added (both reviewers)"
      deferred_issues:
        - severity: low
          gate: architecture
          detail: "canonicalize IO error maps to Error::Worktree (preserves work-dir path context) rather than Error::Io via #[from]. sonnet noted the convention deviation; kept intentionally for context. opus did not flag."
    verification:
      lib_tests: "294 passed; 0 failed"
      clippy_all_targets: clean
      fmt: clean
      gix_api: "gix::discover -> repo.main_repo() -> main.workdir() -> std::fs::canonicalize"
  - batch: 3
    tasks: [WTI-006]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "no nested/subdir path test -> added tracked_nested_path_reads_tracked (pins forward-slash bstr key)"
        - "redundant assert_ne!(Tracked) after assert_eq!(Submodule) -> removed"
        - "untracked-present test lacked same-repo Tracked cross-check -> added README.md==Tracked"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet]
      gates: { correctness: pass, security: pass, architecture: pass, style: pass }
      outcome: changes_requested -> approved
      issues_resolved:
        - severity: medium
          gate: correctness
          detail: "forward_slash_key used to_string_lossy() -> non-UTF-8 path keys diverge from the git index raw-byte key => false Absent, defeating the guard"
          fix: "rebuild key from as_os_str().as_encoded_bytes() (byte-level \\ -> /, strip ALL leading ./); added forward_slash_key_normalizes_separators_and_dot_prefix test"
      deferred_issues:
        - severity: low
          gate: architecture
          detail: "repo.index() errors on unborn-HEAD/no-index instead of IndexKind::Absent. Unreachable in the apply path (a linked worktree always has an index); erroring is the safer default. Kept; documented."
    verification:
      lib_tests: "300 passed; 0 failed"
      clippy_all_targets: clean
      fmt: clean
      gix_api: "repo.index() -> entry_by_path(forward-slash BString) -> Mode::COMMIT?Submodule:Tracked / None?Absent"
  - batch: 4
    tasks: [WTI-007]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "is_submodule_true test lacked the 160000 gitlink fixture self-check -> added (matches index_kind sibling)"
        - "lookalike 'naming it' not load-bearing (submodule-walk also contains 'submodule') -> switched lookalike to bare 'submodulewalk', pins the explicit serde rename is required"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet]
      gates: { correctness: pass, security: pass, architecture: pass, style: pass }
      outcome: approved   # both reviewers
      low_findings_handled:
        - "is_submodule # Errors doc opened with process narration -> trimmed to the contract sentence"
      notes: "no production match on IncludeMode yet (only config.rs) -> zero catch-all risk; WTI-003 apply must add a SubmoduleWalk arm. // <task-id>: test-section comments kept to match the file's established PAM-/DLD-/WTI- convention."
    verification:
      lib_tests: "306 passed; 0 failed"
      clippy_all_targets: clean
      fmt: clean
  - batch: 5
    tasks: [WTI-003]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "vacuous stateless test (fake_home never wired) -> snapshot worktree+primary path-sets before/after"
        - "place_symlink_atomic under-specified -> overwrite-existing-symlink + directory-target cases"
        - "no directory-source coverage -> symlink-on-dir + copy-tree-on-dir tests"
        - "copy_mode_on_submodule used exists() (follows links) -> symlink_metadata (catch dangling)"
        - "submodule-walk never asserted .git exclusion or walk idempotency -> added"
        - "CLI path arg untested -> added apply <path> => Some(path)"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet, code-review-opus-recheck]
      gates: { correctness: pass, security: pass, architecture: pass, style: pass }
      outcome: changes_requested -> fixes_confirmed
      issues_resolved:
        - severity: critical
          gate: correctness
          detail: "tracked guard + submodule detection classified against repo.main_repo() (PRIMARY index) not the linked worktree's own index; on divergent branches could shadow a file tracked IN THE WORKTREE. Both reviewers independently verified against gix source."
          fix: "classify index_kind/is_submodule against the passed worktree repo; tester re-staged fixtures into the worktree index + added discriminating tracked_only_in_worktree_index_is_refused"
        - severity: high
          gate: correctness
          detail: "missing-source guard bypassed for submodules => dangling link / read_dir error"
          fix: "apply_submodule returns Skipped(MissingSource) when src absent; test missing_submodule_source_skips_without_dangling_link"
        - severity: medium
          gate: correctness
          detail: "copy_tree(allow_symlinks=false) hard-errors on a primary dir containing symlinks"
          fix: "copy_tree(...,true); test copy_mode_directory_with_symlink_content_succeeds"
        - severity: low
          gate: correctness
          detail: "copy temp leaked on copy failure"
          fix: "best-effort temp cleanup on copy error (mirrors place_symlink_atomic)"
      deferred_issues:
        - severity: medium
          detail: "fail-fast: a single entry's error aborts remaining entries; warn-and-continue + exit code is WTI-004"
          owner: WTI-004
        - severity: low
          detail: "CLI prints EntryOutcome via Debug ({:?}); human-readable output formatting"
          owner: WTI-004
        - severity: low
          detail: "no-clobber symlink_metadata-then-act TOCTOU (best-effort, stateless engine)"
        - severity: low
          detail: "apply_submodule Copy arm unreachable-by-value (guarded earlier); optional unreachable!() for clarity"
    verification:
      lib_tests: "327 passed; 0 failed"
      worktree_apply_tests: "21 passed"
      clippy_all_targets: clean
      fmt: clean
  - batch: 6
    tasks: [WTI-004]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "primary_noop==false on the normal path was never asserted -> added to report_without_failures test"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet]
      gates: { correctness: pass, security: pass, architecture: pass, style: pass }
      outcome: approved   # both reviewers
      low_findings_handled:
        - "apply # Errors doc stale (no ? remains, always Ok) -> corrected to state failures are recorded as EntryOutcome::Failed"
      deferred_issues:
        - severity: low
          detail: "CLI prints EntryOutcome via Debug {:?}; a Display impl would polish output. Informative enough for now."
        - severity: low
          detail: "run_worktree_apply uses process::exit(1) on had_failures (bypasses Drop) — matches the existing finish_sync precedent; kept for consistency."
    verification:
      lib_tests: "331 passed; 0 failed"
      worktree_apply_tests: "25 passed"
      clippy_all_targets: clean
      fmt: clean
  - batch: 7
    tasks: [WTI-005]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "symlink-beats-copy precedence untested -> pinned (both orders)"
        - "glob coverage only `*` -> added `?` and `[`"
        - "invalid submodule-walk combos (no symlink / copy+walk) -> skip+report pinned"
        - "negation skip reason unchecked -> asserted"
        - "unsafe legacy paths (absolute/../.) -> skip+report so output always re-parses"
        - "unknown trailing attr -> ignored, path still imported (Copy)"
        - "tab/whitespace separators -> handled"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet, code-review-sonnet-recheck]
      gates: { correctness: pass, security: pass, architecture: pass, style: pass }
      outcome: changes_requested -> fixes_confirmed
      tests_intact_after_accidental_restore: true   # implementer dropped+restored the test block; both reviewers verified all 16 intact/unweakened
      issues_resolved:
        - severity: critical
          gate: correctness
          detail: "is_safe_relative used Path::components() which normalizes interior `.` away, diverging from Config::parse (string-split) -> a/./b, foo/. imported then failed re-parse"
          fix: "is_safe_relative now string-splits on ['/','\\\\'] rejecting any `.`/`..` segment (+ empty/absolute), mirroring Config::parse; interior_dot_paths_are_skipped pins it"
        - severity: medium
          gate: correctness
          detail: "TOML renderer embedded path via display() unescaped -> a safe path with `\"`/`\\` emitted invalid TOML"
          fix: "render_worktree_toml escapes via toml_edit::value; centralized as crate::import_legacy::render_worktree_toml (CLI uses it, private cli copy deleted); rendered_toml_escapes_special_chars_and_reparses pins it"
        - severity: medium
          gate: docs
          detail: "README `import-legacy >> phora.toml` would duplicate version/[worktree] keys"
          fix: "README redirects to a scratch worktree-includes.toml with a merge-by-hand note"
    verification:
      lib_tests: "349 passed; 0 failed"
      import_legacy_tests: "18 passed"
      clippy_all_targets: clean
      fmt: clean
