scope: worktree-include
batch_reviews:
  - batch: 1
    tasks: [WTI-001]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "interior `..` traversal not pinned (leading-only) -> added interior_traversal_include_path_is_rejected"
        - "loose Err(Error::Config(_)) matching -> tightened to assert msg names offending path"
        - "empty local includes=[] replace not pinned -> added merge_local_empty_worktree_includes_clears_base"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet]
      gates:
        correctness: pass   # after fixes
        security: pass
        architecture: pass
        style: pass
      outcome: changes_requested -> approved
      issues_resolved:
        - severity: medium
          gate: correctness
          detail: "empty path \"\" and `.`/CurDir include paths were accepted; a lone `.` would symlink the whole worktree root at apply"
          fix: "reject empty path; reject any `.` segment (raw-segment scan, since Path::components() normalizes interior `.` away); 3 new tests"
        - severity: low
          gate: architecture
          detail: "merge inlined instead of WorktreeConfig::merged_with (scope review_fix K-003 specified the method)"
          fix: "added WorktreeConfig::merged_with (wholesale replace); merge_configs uses the sibling Some/None match shape"
    deferred_issues:
      - severity: medium
        gate: security
        detail: "path guard uses std::path semantics; Windows-separator/drive/UNC paths (C:\\, \\\\server, sub\\..\\..) parse as single opaque components on this Unix target and bypass absolute/.. checks. Benign on Unix; real containment is apply-time canonicalization."
        owner: WTI-003 / WTI-006
      - severity: low
        gate: security
        detail: "parse-time string validation cannot guarantee worktree-root containment against symlink-component escapes; enforce at apply time via canonicalize + root-prefix assertion."
        owner: WTI-003
    verification:
      lib_tests: "289 passed; 0 failed"
      clippy_all_targets: clean
      fmt: clean
  - batch: 2
    tasks: [WTI-002]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "error tests asserted Display substrings -> added Error::Worktree(String) variant; assert matches!(Error::Worktree(_)) + disjoint substring to distinguish bare vs not-a-repo"
        - "nested-subdir fixture used a non-canonical start path -> canonicalize the fixture path (macOS /var vs /private/var)"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet]
      gates: { correctness: pass, security: pass, architecture: pass, style: pass }
      outcome: approved   # both reviewers
      low_findings_handled:
        - "# Errors doc omitted canonicalize-failure path -> doc bullet added (both reviewers)"
      deferred_issues:
        - severity: low
          gate: architecture
          detail: "canonicalize IO error maps to Error::Worktree (preserves work-dir path context) rather than Error::Io via #[from]. sonnet noted the convention deviation; kept intentionally for context. opus did not flag."
    verification:
      lib_tests: "294 passed; 0 failed"
      clippy_all_targets: clean
      fmt: clean
      gix_api: "gix::discover -> repo.main_repo() -> main.workdir() -> std::fs::canonicalize"
  - batch: 3
    tasks: [WTI-006]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "no nested/subdir path test -> added tracked_nested_path_reads_tracked (pins forward-slash bstr key)"
        - "redundant assert_ne!(Tracked) after assert_eq!(Submodule) -> removed"
        - "untracked-present test lacked same-repo Tracked cross-check -> added README.md==Tracked"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet]
      gates: { correctness: pass, security: pass, architecture: pass, style: pass }
      outcome: changes_requested -> approved
      issues_resolved:
        - severity: medium
          gate: correctness
          detail: "forward_slash_key used to_string_lossy() -> non-UTF-8 path keys diverge from the git index raw-byte key => false Absent, defeating the guard"
          fix: "rebuild key from as_os_str().as_encoded_bytes() (byte-level \\ -> /, strip ALL leading ./); added forward_slash_key_normalizes_separators_and_dot_prefix test"
      deferred_issues:
        - severity: low
          gate: architecture
          detail: "repo.index() errors on unborn-HEAD/no-index instead of IndexKind::Absent. Unreachable in the apply path (a linked worktree always has an index); erroring is the safer default. Kept; documented."
    verification:
      lib_tests: "300 passed; 0 failed"
      clippy_all_targets: clean
      fmt: clean
      gix_api: "repo.index() -> entry_by_path(forward-slash BString) -> Mode::COMMIT?Submodule:Tracked / None?Absent"
  - batch: 4
    tasks: [WTI-007]
    test_review:
      reviewers: [test-review-opus, test-review-sonnet]
      outcome: needs_changes -> clean
      findings_addressed:
        - "is_submodule_true test lacked the 160000 gitlink fixture self-check -> added (matches index_kind sibling)"
        - "lookalike 'naming it' not load-bearing (submodule-walk also contains 'submodule') -> switched lookalike to bare 'submodulewalk', pins the explicit serde rename is required"
    code_review:
      reviewers: [code-review-opus, code-review-sonnet]
      gates: { correctness: pass, security: pass, architecture: pass, style: pass }
      outcome: approved   # both reviewers
      low_findings_handled:
        - "is_submodule # Errors doc opened with process narration -> trimmed to the contract sentence"
      notes: "no production match on IncludeMode yet (only config.rs) -> zero catch-all risk; WTI-003 apply must add a SubmoduleWalk arm. // <task-id>: test-section comments kept to match the file's established PAM-/DLD-/WTI- convention."
    verification:
      lib_tests: "306 passed; 0 failed"
      clippy_all_targets: clean
      fmt: clean
