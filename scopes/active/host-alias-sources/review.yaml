    synthesized:
      gates: { correctness: pass, security: pass, performance: pass, architecture: pass, style: pass }
      critical_issues: 0
      high_issues: 0   # the host-mode refetch is HAS-005's defined scope, not a HAS-003 defect
      medium_issues: 3 # resolved pre-commit
    outcome: approved
    fixes:
      - "silent \"\" map-miss -> named error (remote_for helper)"
      - "validate() wired on rebuild path too (every resolving command validates post-merge)"
      - "resolution errors already named per source (verified)"
      - "comment hygiene: moved misplaced test doc; removed HAS-003 process-narration banner"
