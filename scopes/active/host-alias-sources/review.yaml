    tasks: [HAS-001]
    reviewers:
      - id: general-claude-opus
        status: success
        gates: { correctness: pass, security: pass, performance: pass }
        verdict: approved
      - id: general-claude-sonnet
        status: success
        gates: { correctness: fail, security: pass, performance: pass }
        verdict: changes_requested
      - id: architecture-claude-sonnet
        status: success
        gates: { architecture: fail }
        verdict: changes_requested
      - id: compliance-claude-opus
        status: success
        gates: { style: pass }
        verdict: approved
    synthesized:
      gates: { correctness: pass, security: pass, performance: pass, architecture: pass, style: pass }
      critical_issues: 0
      high_issues: 1   # resolved pre-commit
      medium_issues: 4 # deferred to HAS-002/003/005 with markers
