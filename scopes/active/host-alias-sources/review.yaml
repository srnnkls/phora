      - id: M-host-mode-refetch
        found_by: [general-claude-opus, general-claude-sonnet, architecture-claude-sonnet]
        issue: "LockedSource.git now stores resolved remote, but source_matches still compares raw source.git (None->\"\") => host-mode sources refetch every sync"
        owner: HAS-005
        note: "Scope's documented CRITICAL for HAS-005; functional result correct, idempotency restored by next task"
  - batch: 4
    tasks: [HAS-005, HAS-006, HAS-001-C]
    reviewers:
      - id: general-claude-opus
        status: success
        gates: { correctness: pass, security: pass, performance: pass }
        verdict: approved
      - id: general-claude-sonnet
        status: success
        gates: { correctness: pass, security: pass, performance: pass }
        verdict: approved
