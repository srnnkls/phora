scope: host-alias-sources
issue_type: Feature
created: 2026-06-07
revised: 2026-06-08   # post multi-agent review (opus+sonnet)

tasks:
  - id: HAS-001
    content: "Config: host/path/protocol + Host.remote (string-or-table) + git_url→remote + git→Option"
    status: done
    activeForm: "Adding host/path/protocol + remote config"
    review_fixes:
      - "CRITICAL (Source.git is a required String, consumed at ~8 sites): make `git` Option<String>; merged_with becomes MODE-AWARE — git XOR host+path are atomic groups; setting either in local clears the other (mirror the branch/tag/rev clearing at config.rs:136)"
      - "HIGH (global protocol): add a top-level Config `protocol`; merge_configs (config.rs:48) must overlay it (it only handles version+maps today); deny_unknown_fields still passes"
      - "HIGH (validation placement): unknown-host + protocol-without-remote-key run POST-MERGE (a local source may reference a base-defined host); mode-exclusivity may stay in Config::parse"
      - "MEDIUM (fixtures): migrate every `git_url` fixture to `remote` (config.rs:390,520,824-851,936; cli.rs:1382) or deny_unknown_fields rejects"
    acceptance:
      - "Source gains host/path/protocol (Option); git becomes Option<String>; deny_unknown_fields holds"
      - "Host.remote replaces git_url, string-or-table via RemoteConfig (mirror LayoutConfigRaw, config.rs:307); inner {https,ssh} table is deny_unknown_fields, ≥1 key present"
      - "Top-level Config.protocol (Option, default https) overlaid by merge_configs"
      - "merged_with: mode groups atomic; partial local override (e.g. only branch) preserves base mode + base remote/auth"
      - "Mode exclusivity (exactly one of git | host+path) in Config::parse; unknown-host + protocol-key checks in a post-merge validate fn"
    tests:
      - "remote parses as string and { https, ssh }; host+path parses; git+host rejected; host w/o path rejected"
      - "merge: base host+path + local sets only branch => mode preserved (not cleared)"
      - "local source references a host defined only in base => no error after merge"
      - "protocol=ssh with https-only remote => error (post-merge)"

  - id: HAS-002
    content: "Resolver: Protocol + resolved_remote + ONE built-in forge registry"
    status: done
    activeForm: "Implementing host/protocol remote resolution"
    depends_on: [HAS-001]
    review_fixes:
      - "MEDIUM (dup registry): the built-in forge table must be the SINGLE source of truth; retire/derive cli.rs host_templates (cli.rs:584, {owner}/{repo} https-only) from it so add + resolver agree"
      - "LOW (sr.ht): the ~user/repo forge template must use {path}; add a test"
    acceptance:
      - "Protocol enum { Https, Ssh }; built-in forge tables (github/gitlab/codeberg/sr.ht/bitbucket) both shapes, overridable by [hosts.X]"
      - "resolved_remote(&hosts, protocol): git-mode verbatim; host-mode picks remote[protocol], fills {path}, derives {owner}=first segment / {repo}=remainder"
      - "Resolved remote feeds NormalizedUrl; symbolic-https, symbolic-ssh, and literal of one repo => SAME MirrorKey"
      - "cli host_templates is unified with this registry (no second source of truth)"
    tests:
      - "github+srnnkls/tropos https/ssh resolve correctly; gitlab subgroup group/sub/proj via {owner}/{repo} ≡ {path}"
      - "sr.ht ~user/repo via {path}"
      - "MirrorKey(symbolic https) == MirrorKey(symbolic ssh) == MirrorKey(literal) "
      - "[hosts.github] override reflected in BOTH resolved_remote and add output"

  - id: HAS-003
    content: "Wire resolution through fetch / sync / discovery (all ~8 sites)"
    status: pending
    activeForm: "Threading resolved_remote through sync"
    depends_on: [HAS-002]
    review_fixes:
      - "HIGH (threading breadth): `&source.git` is consumed at ~8 sites (sync.rs:197,379,385,426,430,526,714,793), not just resolve_sources. Compute resolved_remote ONCE per source and thread the String down (avoids threading hosts+protocol into deploy/verify/where contexts)"
    acceptance:
      - "effective_protocol(source) = source.protocol ?? config.protocol ?? Https — computed once with resolved_remote per source"
      - "Every &source.git consumer uses the precomputed resolved remote"
      - "host+path source fetches/resolves/deploys identically to its literal twin"
    tests:
      - "end-to-end sync of a host+path source against a local fixture host"
      - "literal-URL sources still sync unchanged; per-source protocol beats global default"

  - id: HAS-004
    content: "add writes symbolic host/path (both writer paths)"
    status: done
    activeForm: "Making add persist the alias"
    depends_on: [HAS-001]
    review_fixes:
      - "HIGH (two writers): run_add uses insert_source_with_ref (cli.rs:208), tests hit insert_source (cli.rs:742) — update/consolidate BOTH; ParsedSource (cli.rs:557) must carry the symbolic form"
      - "MEDIUM (dispatch order): parse_add_url order = scp-ssh → scheme URL → host:path colon alias → slash shorthand; is_scp_ssh needs '@' so github:owner/repo is unambiguous (confirmed cli.rs:620)"
    acceptance:
      - "Both insert paths write host + path (+ protocol if non-default); bare owner/repo => github"
      - "parse_add_url accepts host:owner/repo without colliding with scp"
      - "Integration test asserts run_add's TOML output, not just insert_source in isolation"
    tests:
      - "add github:srnnkls/tropos => [sources.tropos] host=github path=srnnkls/tropos (via run_add)"
      - "git@h:o/r still parses as scp literal; gitlab:o/r => symbolic gitlab"

  - id: HAS-005
    content: "Lock shape + protocol-independent source_matches"
    status: pending
    activeForm: "Stabilizing lock across literal/symbolic/protocol"
    depends_on: [HAS-003]
    review_fixes:
      - "CRITICAL: source_matches (lock.rs:50) compares RAW strings; flipping protocol changes the resolved string and BREAKS matching. It must compare NormalizedUrl/MirrorKey identity, and its signature gains (hosts, protocol)"
      - "CRITICAL (field collision): LockedSource already has `git` (remote) AND `resolved` (=refspec). Keep `resolved`=refspec; store the resolved remote in `git` (or rename git→`remote`); add symbolic origin (host/path/protocol) as serde-default fields for back-compat"
      - "MEDIUM (schema): decide lock `version` bump; an existing literal-git lock must still match under normalized comparison"
    acceptance:
      - "source_matches compares NormalizedUrl(resolved_remote) (protocol-independent), refspec, config_digest"
      - "LockedSource: resolved=refspec (unchanged); remote identity field documented; symbolic origin optional w/ serde default"
      - "literal git <-> equivalent host+path, and https <-> ssh, do NOT refetch"
    tests:
      - "host+path source: matching lock suppresses fetch (counting backend, 0 fetches)"
      - "lock written as https still matches the source resolved as ssh (no refetch)"
      - "existing literal-git lock still matches a literal-git source (regression)"

  - id: HAS-006
    content: "Docs: host-aliased sources, remote table, protocol, built-in forges"
    status: pending
    activeForm: "Documenting host-alias sources"
    depends_on: [HAS-002, HAS-004]
    acceptance:
      - "README + phora.example.toml document host+path+protocol, remote string-or-table, built-in forges, default github/https, mode exclusivity, add behavior"
