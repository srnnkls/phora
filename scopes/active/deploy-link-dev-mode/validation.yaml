scope: deploy-link-dev-mode
issue_type: Feature
created: 2026-06-07

ambiguity_scan:
  scope:        clear     # local-only opt-in, additive to reflink default; out-of-scope listed
  behavior:     clear     # live working-tree symlink, idempotent re-sync, transitions defined
  data_model:   clear     # RegistryRecord.linked + ArtifactState::Linked + DeployMode enum
  constraints:  clear     # local-path-only, local-overlay-only, warn-and-continue (all confirmed)
  edge_cases:   partial   # stale symlink / pre-existing real dir / Windows privilege covered; symlink-cycle and target-deleted-while-linked left to implementation
  integration:  clear     # phora.local.toml overlay, base/local lock split, journal all exist
  terminology:  clear     # "link-mode", "linked artifact", "deploy mode" defined in scope.md

decisions:
  - id: link-target
    question: "Snapshot or live working tree?"
    resolution: "Live working tree (absolute path), bypassing git ODB export"
    confirmed_by: user
  - id: integrity
    question: "How do linked artifacts interact with drift/verify/prune?"
    resolution: "Tracked-quarantine: linked=true marker, ArtifactState::Linked, verify/rebuild skip, prune symlink-safe"
    confirmed_by: user
    precedent: "scopes/done/phora-artifact-manager/validation.yaml:163"
  - id: guardrails
    question: "When is link-mode honored?"
    resolution: "Local-path sources only AND phora.local.toml only AND warn-and-continue on failure"
    confirmed_by: user
  - id: config-digest
    question: "Is deploy mode part of config_digest?"
    resolution: "Excluded — deploy is not export-affecting; avoids spurious lock invalidation"
    confirmed_by: assistant-default

open_risks:
  - id: target-vanishes
    description: "Linked target dir deleted/renamed in the working tree after deploy leaves a dangling symlink"
    resolution: "v1: dangling link is the user's working-tree concern; Linked state must not crash on a broken link; document"
  - id: relative-vs-absolute
    description: "Absolute symlink target is simplest but non-portable if the checkout moves"
    resolution: "v1: absolute target; portability is out of scope for a local dev override"
  - id: nested-layout-symlink
    description: "by-source / prefixed layouts place the symlink at a nested artifact path; parent dirs must exist"
    resolution: "Create parent chain before symlink, mirroring the copy deploy path"

review_config:
  reviewers: [opus, sonnet]   # default; override via /scope review --reviewers
  note: "Task-level batch review applies; integrity-quarantine and crash-window are the highest-value review targets"

verification_gate:
  - "cargo test green including new link-mode tests"
  - "manual live-edit loop verified (edit checkout file -> live in target, no re-sync)"
  - "phora verify reports no drift over a linked artifact; phora list shows it linked"

review_session:
  date: 2026-06-07
  reviewers: [claude-opus, claude-sonnet]
  gate_summary:
    completeness: address
    consistency: address
    feasibility: fail
    clarity: address
    design_depth: address
  recommendation: address_issues   # re-review or implement with the fixes folded in
  findings:
    - id: C1
      severity: critical
      found_by: [claude-opus, claude-sonnet]
      area: resolve_sources
      issue: "resolve_sources fetch+resolve+digest every source (sync.rs:373); a link source may have no mirror -> error"
      resolution: "DLD-009: sidestep mirror, synthesize audit lock entry (user-chosen)"
    - id: C2
      severity: critical
      found_by: [claude-opus]
      area: discovery
      issue: "Filesystem discovery specified only for deploy; prune (sync.rs:524) + rebuild (sync.rs:712) still ODB-discover linked sources"
      resolution: "DLD-003 revised: single mode-aware discovery helper across all three sites"
    - id: H1
      severity: high
      found_by: [claude-sonnet]
      area: idempotence
      issue: "ArtifactState::Linked not caught by matches! at sync.rs:299 (matches on conflict_kind Option) -> re-deploys every sync"
      resolution: "DLD-005 revised: add Linked to the matches! no-deploy guard + idempotence test"
    - id: H2
      severity: high
      found_by: [claude-opus, claude-sonnet]
      area: integration
      issue: "phora.local.toml-only guard needs provenance lost after merge_configs"
      resolution: "DLD-002 revised: enforce in sync against base_config (pre-merge)/local_names"
    - id: H3
      severity: high
      found_by: [claude-opus, claude-sonnet]
      area: terminology
      issue: "'reuse NormalizedUrl local-path semantics' impossible; no is_local predicate exists"
      resolution: "DLD-002 revised: define a real is_local_path predicate"
    - id: H4
      severity: high
      found_by: [claude-sonnet]
      area: constraints
      issue: "swap_into cross-device copy_tree fallback (projection.rs:420) would follow a temp symlink and walk the tree"
      resolution: "DLD-004 revised: link_artifact uses its own temp-symlink+rename, no copy_tree path"
    - id: H5
      severity: high
      found_by: [claude-opus]
      area: completeness
      issue: "cli.rs:882 state_label exhaustive match breaks; cli.rs absent from Key Files"
      resolution: "Added cli.rs to Key Files; DLD-005 adds the Linked label arm"
    - id: M_dispatch
      severity: medium
      found_by: [claude-opus, claude-sonnet]
      area: constraints
      issue: "Deploy dispatch should be the deploy_artifact_entry closure (sync.rs:279), not inside deploy_one"
      resolution: "DLD-004 + Key Files updated"
    - id: M_record
      severity: medium
      found_by: [claude-opus, claude-sonnet]
      area: data_model
      issue: "linked RegistryRecord.commit/digest are required Strings"
      resolution: "DLD-005: sentinel commit/digest"
    - id: M_windows
      severity: medium
      found_by: [claude-sonnet]
      area: constraints
      issue: "directory artifact needs symlink_dir on Windows"
      resolution: "DLD-004: platform-gated symlink helper"
    - id: M_dangling
      severity: medium
      found_by: [claude-opus, claude-sonnet]
      area: edge_cases
      issue: "dangling linked symlink -> try_exists false -> Missing -> redeploy"
      resolution: "DLD-005: documented intentional v1 (Missing -> recreate, no crash)"
