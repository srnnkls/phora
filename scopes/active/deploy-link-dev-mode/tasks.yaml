scope: deploy-link-dev-mode
issue_type: Feature
created: 2026-06-07
revised: 2026-06-07   # post multi-agent review (opus+sonnet)

tasks:
  - id: DLD-001
    content: "Config: DeployMode enum + Source.deploy field, merge, digest exclusion"
    status: done
    activeForm: "Adding DeployMode field to Source config"
    acceptance:
      - "DeployMode { Copy, Link } deserializes from deploy = \"copy\" | \"link\"; absent => Copy"
      - "Source.deploy: Option<DeployMode>; effective mode readable at resolve, discovery, AND deploy sites (it gates all three)"
      - "merged_with overrides deploy only when local sets it"
      - "deploy is NOT folded into config_digest (lock stability; safe per source_matches comparing git+refspec+config_digest, lock.rs:50)"
      - "deny_unknown_fields holds; unknown deploy value rejected naming the value"
    tests:
      - "deploy absent => Copy; deploy = link parses to Link"
      - "local deploy override replaces base; base-only deploy survives partial override"
      - "config_digest identical with vs without deploy set"

  - id: DLD-002
    content: "Guardrails: real local-path predicate + local-overlay-only at sync layer"
    status: done
    activeForm: "Enforcing link-mode guardrails"
    depends_on: [DLD-001]
    review_fixes:
      - "REVISED (H3): NormalizedUrl does NOT classify local vs remote (source.rs:85-112); drop the 'reuse NormalizedUrl' framing"
      - "REVISED (H2): provenance is lost after merge_configs; enforce against base_config (pre-merge) / local_names (sync.rs:96), NOT in Config::parse/merged_with"
    acceptance:
      - "New is_local_path predicate: git string is an absolute/existing filesystem path and NOT an scp-style or scheme URL (https/ssh/git@)"
      - "deploy = link on a non-local (remote URL) git => Error naming the source"
      - "Local-overlay-only guard evaluated in sync against base_config: if base_config.sources[name].deploy == Link => Error, regardless of local override"
      - "Guard site is sync orchestration (mirrors split_locks/local_names routing), not config parsing"
    tests:
      - "is_local_path: https/ssh/scp forms => false; /abs/path and ./rel existing => true"
      - "link in base phora.toml => rejected; link only in phora.local.toml => accepted"
      - "remote git + link => rejected"

  - id: DLD-003
    content: "Mode-aware working-tree discovery (deploy + prune + rebuild)"
    status: done
    activeForm: "Discovering linked artifacts from the working tree"
    depends_on: [DLD-001]
    review_fixes:
      - "REVISED (C2): discovery is forked across THREE sites (deploy_target sync.rs:189, prune_orphans sync.rs:524, rebuild_registry sync.rs:712); a linked source must discover from disk in ALL of them, else ODB discovery errors or contradicts the model"
    acceptance:
      - "Single mode-aware discovery helper: Link => scan <local path>/<root> on disk; Copy => existing backend.discover_artifacts over the ODB"
      - "All three call sites (deploy, prune, rebuild) route through the helper"
      - "Disk scan honors root + include/exclude matcher + dotdir skip, mirroring discover_artifacts; resolves an absolute canonical link target per artifact"
      - "Missing local path or root => clear error"
    tests:
      - "working-tree dirs discovered, sorted; dotdirs/non-dirs excluded; uncommitted (un-added) dirs still discovered"
      - "a linked source is discovered from disk in prune and rebuild, never via ODB (cross-site invariant test)"
      - "absent path / root errors"

  - id: DLD-004
    content: "Link deployment: own lean atomic symlink, dispatched in orchestration"
    status: done
    activeForm: "Implementing atomic symlink deployment"
    depends_on: [DLD-003, DLD-005]
    review_fixes:
      - "REVISED (H4): do NOT route through deploy_artifact/swap_into — its cross-device copy_tree fallback (projection.rs:420) would follow the temp symlink and walk the working tree. link_artifact gets its own temp-symlink + rename."
      - "REVISED (medium): dispatch on DeployMode at the deploy closure in deploy_artifact_entry (sync.rs:279), NOT inside deploy_one, so the Copy path stays byte-identical"
      - "REVISED (medium): Windows uses std::os::windows::fs::symlink_dir for directory artifacts; Unix uses std::os::unix::fs::symlink, behind one helper"
    acceptance:
      - "link_artifact: create_dir_all(parent); temp symlink beside dst -> absolute <local path>/<root>/<artifact>; rename into dst (atomic); replace stale symlink / pre-existing dir safely"
      - "No copy_tree/cross-device fallback on the link path"
      - "Symlink-create failure warns, skips the artifact, sets had_failures, continues sync"
      - "Copy path (export->stage->reflink swap) unchanged"
    tests:
      - "linked artifact materializes as a symlink to the absolute working-tree path; edit-through visible"
      - "forced symlink failure => warn + skip + continue; copy artifacts unaffected"
      - "stale link with wrong target re-pointed atomically"

  - id: DLD-005
    content: "Registry linked marker + ArtifactState::Linked (+ matches! guard + cli label)"
    status: done
    activeForm: "Adding linked marker and Linked state"
    depends_on: [DLD-001]
    review_fixes:
      - "REVISED (H1, critical-silent): ArtifactState::Linked must be added to the matches! guard at sync.rs:299 (it matches on conflict_kind Option, so the variant is NOT caught by exhaustiveness) — else Linked falls to None => Overwrite and re-deploys every sync"
      - "REVISED (H5): cli.rs state_label (cli.rs:882) is an exhaustive match; add a Linked arm; add cli.rs to Key Files"
      - "REVISED (medium): linked RegistryRecord.commit/digest are required Strings — define sentinels"
      - "REVISED (medium): dangling linked symlink => Missing => redeploy (documented intentional v1)"
    acceptance:
      - "RegistryRecord.linked: bool (serde default false); linked records carry empty files; commit = sentinel (e.g. \"link\"), digest = sentinel (e.g. \"link:\")"
      - "check_artifact_state returns Linked for linked keys, short-circuiting BEFORE the commit/source mismatch check (projection.rs:59); never Modified/Foreign"
      - "deploy_artifact_entry treats Linked as a no-deploy case (matches! guard sync.rs:299 includes Linked alongside Ejected/Clean)"
      - "Old non-linked records still round-trip (back-compat default)"
    tests:
      - "linked record round-trips with linked=true, files empty, sentinel commit/digest"
      - "second sync over a correct link is a no-op (NOT overwritten) — pins the matches! fix"
      - "deployed symlink at a linked key => Linked, not Foreign; dangling link => Missing (no crash)"
      - "phora list shows the artifact as linked (state_label arm)"

  - id: DLD-006
    content: "Quarantine verify, rebuild, and prune for linked artifacts"
    status: pending
    activeForm: "Quarantining linked artifacts from integrity ops"
    depends_on: [DLD-004]
    acceptance:
      - "verify() skips linked records (no mismatch/missing emitted)"
      - "rebuild_registry() reconstructs linked marker without hashing; discovers linked sources from disk (DLD-003 helper); never flags them modified/foreign (scan_foreign is_dir() no-follow already skips symlinks — pin it)"
      - "prune_orphans removes an orphaned linked artifact by deleting the symlink only (remove_orphan_path symlink_metadata path, sync.rs:501)"
    tests:
      - "verify over a linked artifact yields no mismatch even if target edited"
      - "rebuild preserves linked=true; linked symlink NOT in report.foreign"
      - "prune removes a stale symlink without following it"

  - id: DLD-007
    content: "Deploy-mode transitions: link<->copy"
    status: pending
    activeForm: "Handling link/copy transitions"
    depends_on: [DLD-004, DLD-006]
    acceptance:
      - "link -> copy: symlink removed, reflink copy materialized, full per-file integrity restored (linked=false)"
      - "copy -> link: real dir removed (remove_path is_dir => remove_dir_all), symlink created, record flips linked=true"
      - "Transitions leave a consistent dst on interruption (next sync re-derives state)"
    tests:
      - "switch link->copy => real files, verify passes, linked=false"
      - "switch copy->link => symlink, verify skips, linked=true"

  - id: DLD-008
    content: "Docs + phora.local.toml example for deploy = link"
    status: pending
    activeForm: "Documenting link-mode"
    depends_on: [DLD-002, DLD-005]
    acceptance:
      - "README/example: deploy = link is local-path-only, local-overlay-only, live-edit"
      - "Integrity carve-out + dangling-link (Missing/redeploy) + Windows warn-and-continue documented"

  - id: DLD-009
    content: "Link-source resolution: sidestep mirror, synthesize audit lock entry"
    status: done
    activeForm: "Resolving link sources without the mirror"
    depends_on: [DLD-001]
    review_fixes:
      - "REVISED (C1, critical): resolve_sources (sync.rs:373) unconditionally fetch+resolve+compute_digest every source; a local path used only as a link may have no mirror and would error. User decision: sidestep git but still record a lock entry for auditing."
    acceptance:
      - "resolve_sources branches on effective DeployMode: a Link source does NOT call backend.fetch / mirror compute_digest"
      - "A LockedSource is still synthesized for audit: git = local path, resolved = \"link\", commit = HEAD read directly via gix::open(local path) if it is a git repo else sentinel, digest = working-tree digest or sentinel, config_digest as usual, distinguishable as link"
      - "Sync succeeds for a local path that was never cloned (no mirror exists)"
    tests:
      - "a link source with NO reachable git mirror still syncs and produces a lock entry"
      - "lock entry records the local path + directly-read HEAD (not a mirror clone); no fetch occurs (counting backend asserts 0 fetches for the link source)"
