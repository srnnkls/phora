deferred_issues:
  - id: DLD-005-M1
    severity: medium
    found_by: [pi]
    area: check_artifact_state
    issue: >
      Linked is returned from record.linked + target existence alone, without verifying the dst is
      actually a symlink. A linked record over an externally-replaced regular dir/file (or a symlink
      with the wrong target) becomes a deploy no-op, quarantining arbitrary content.
    assessment: >
      Spec-compliant with DLD-005 acceptance ("never Modified/Foreign for linked keys") and the
      tracked-quarantine design (linked artifacts sit outside the integrity model). linked=true is
      only ever written by phora's own link-deploy, so divergence requires external mutation. Not a
      regression; medium, non-blocking.
    defer_to: DLD-007
    candidate_fix: >
      In the Linked short-circuit, when the dst is present but NOT a symlink, return Missing (redeploy
      the link) instead of Linked — mirrors the dangling-link => Missing => redeploy policy and stays
      within "never Modified/Foreign". Add a test "linked record over a real dir => Missing/redeploy"
      in DLD-007 (transitions) before implementing.
