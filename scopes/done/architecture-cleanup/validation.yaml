scope: architecture-cleanup
issue_type: Feature
created: 2026-06-09
revised: 2026-06-09   # post opus+sonnet review (review.yaml) + git-field-misnomer finding

ambiguity_scan:
  scope:        clear     # centralize membership; re-seat hexagonal/parse-don't-validate; pure refactor + 1 fix + dotfile opt-in + git rename
  behavior:     clear     # behavior-identical except dotfile opt-in, orphan-prune fix, check-match dotfile output
  data_model:   clear     # ParsedSource/Remote ADT + kernel value objects; source digest untouched (zero lock churn)
  constraints:  clear     # edition 2024 + clippy pedantic; gix/ureq/archive confinement (production); no async
  edge_cases:   partial   # git-rename alias lifetime; link-mode/non-repo path in Remote::Literal; url-source fold n/a (digest untouched)
  integration:  clear     # SourceBackend/Registry ports, Selection seam, cli wire(); coordination with add-local-symlink
  terminology:  clear     # Selection (membership), Remote::Literal (was git), content_digest contract

decisions:
  - id: membership-home
    question: "Where does the artifact-membership rule live?"
    resolution: "One Selection value object (kernel/selection.rs), absorbing PathMatcher"
    confirmed_by: user
  - id: dotfile-optin
    question: "What opts a top-level dotfile dir back in?"
    resolution: "An include pattern beginning with '.' (dotglob; .config/.* opt in, * does not) — a bespoke gate over the include list"
    confirmed_by: user
  - id: digest-untouched
    question: "Fix the digest != deploy divergence?"
    resolution: "No. Source-level digest has no production consumer (lock.rs:52); leave it byte-identical, document its contract, pin with a test"
    confirmed_by: review        # opus B1/B2 + sonnet; reframed from the first draft's digest-as-fold
  - id: typed-source-keys
    question: "The `git` field is misnamed (holds any literal location, incl. local/non-repo path)"
    resolution: >
      Typed source-kind keys (uv model) as a proper Remote sum type: git (git-only) | path (local) |
      url (download) | host+repo (forge). Rename forge `path`->`repo` (bare `repo` keeps github default),
      freeing `path` for local; split local out of `git`. Aliases: git=<localpath> => path, host+path => host+repo.
      One break: bare path=<owner/repo> now means local. Ships as a LEADING standalone PR before add-local-symlink.
    confirmed_by: user
  - id: cut-overengineering
    question: "Clock port, sealing, name newtypes, per-context errors?"
    resolution: "Cut Clock + sealing + ArtifactName/SourceName; defer per-context errors with the crate split"
    confirmed_by: review        # opus/sonnet OE1-4
  - id: golden-prereq
    question: "How is behavior-identical verified?"
    resolution: "ARCH-000 golden/snapshot harness is a hard prerequisite (none exists today)"
    confirmed_by: review        # sonnet B5
  - id: workflow
    question: "How to carry out the change?"
    resolution: "Scope, then implement (TDD); reviewed by opus+sonnet before implementation"
    confirmed_by: user

corrections_applied:                # from review.yaml
  - "Digest left untouched (was: digest-as-fold) — no lock re-baseline (B1/B2/B6)"
  - "Worktree subsystem removed in PR #12 — purged worktree/ context + fabricated gix-leak premise (B4)"
  - "Sealing dropped; getter removal kept + dispatch tests rewritten (B3)"
  - "Clock port dropped (OE1); ArtifactName/SourceName dropped (OE4); per-context errors deferred (OE3)"
  - "Line refs re-pinned: check-match cli.rs:605/596 (not 665); DownloadDigest config.rs:446; mode() :622; cli.rs 2598; config.rs 2974"
  - "ParsedSource collision (cli.rs:613) flagged for rename in ARCH-006"
  - "ARCH-000 golden harness prerequisite added (B5)"

open_risks:
  - "Deprecation horizon for the back-compat aliases (`git`=<localpath>, `host`+`path`) is unset — decide before a future drop."
  - "Bare `path`=<owner/repo> changes meaning (was github forge, now local) — the one intentional break; needs a clear migration note + ideally a detection warning."
  - "sync.rs split (ARCH-009) is the highest-effort/highest-regression task — gate on ARCH-000 golden snapshots."

review_config:
  reviewers: [opus, sonnet]   # used for the scope review (review.yaml); reuse for implementation phases

constitution_check: n/a       # no .claude/constitution.md present
