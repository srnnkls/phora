      - "HAS-005 perf: source_matches re-resolves remote though resolve_sources holds it (negligible vs git I/O)"
      - "cosmetic: resolved_remote error labels source by path not name (sync wraps with name)"
      - "source.rs NormalizedUrl split_once('@') edge — unreachable today"
issues:
  high:
    - id: HAS-001-H-remote-required
      found_by: [general-claude-sonnet]
      area: correctness
      file: src/config.rs
      issue: "Host.remote made a required RemoteConfig; broke auth-only [hosts.X] override (cannot add token to a built-in forge while inheriting its remote)"
      resolution: "FIXED pre-commit: Host.remote -> Option<RemoteConfig>, merged_with conditional; auth-only-override test restored with local omitting remote"
      status: resolved
deferred_issues:
  - id: M-forge-registry-duplication
    found_by: [general-claude-opus, architecture-claude-sonnet, compliance-claude-opus]
    issue: "is_known_host {github,gitlab} duplicates cli.rs host_templates; full forge set (codeberg/sr.ht/bitbucket) absent"
    owner: HAS-002
  - id: M-git-bridge-empty-string
    found_by: [general-claude-sonnet, architecture-claude-sonnet]
    issue: "source.git Option bridged to \"\" at ~6 sync.rs sites for host-mode sources; literal-git behavior unchanged"
    owner: HAS-003
    note: "Marked with // HAS-003 comments"
  - id: M-source-matches-raw-string
    found_by: [general-claude-sonnet, architecture-claude-sonnet]
    issue: "source_matches compares raw git strings; host-mode/protocol-flip will not match"
    owner: HAS-005
    note: "Marked with // HAS-005 comment; this is the scope's documented CRITICAL for HAS-005"
  - id: M-validate-not-wired
    found_by: [general-claude-opus]
    issue: "Config::validate not yet invoked on the sync/cli load path"
    owner: HAS-003
  - id: M-config-source-mutual-dep
    found_by: [architecture-claude-sonnet]
    issue: "config.rs <-> source.rs mutual import (Protocol/Refspec)"
    note: "Pre-existing (Refspec already crossed); shared-types refactor out of scope"
    owner: none

final_review:
  status: completed
  reviewers: [final-scope-correctness-claude-opus, final-scope-correctness-claude-sonnet, final-architecture-claude-sonnet]
  gates: { correctness: pass, scope: pass, architecture: pass, security: pass, style: pass, docs: pass }
  scope_compliance:
    all_tasks_complete: true
    all_requirements_met: true
    acceptance_criteria_met: true
    given_when_then_covered: true
  strengths:
    - "builtin_forges() is the single forge registry; cli domain_to_name + config effective_host both derive from it (no duplicate list)"
    - "source_matches compares NormalizedUrl identity (+refspec +config_digest): literal<->symbolic and https<->ssh do not refetch; existing locks still match (no version bump)"
    - "resolved_remote computed once per source and threaded; lazy resolution => [hosts.X].remote change applies next sync with no per-source edit"
    - "mode model (git XOR host+path) coherent across parse/validate/merged_with/ParsedSource; default host=github + default protocol=https honored"
    - "end-to-end git-fixture tests: host+path twin==literal, per-source protocol > global, global protocol applies to silent source"
    - "no TODO/FIXME markers remain; deferred items tracked with owners"
  post_final_fixes:
    - "generalized validate() to the effective protocol (https-without-template now errors at the boundary, not just ssh)"
    - "added shipped phora.example.toml parse+validate regression test"
    - "fixed stale git_url doc reference"
  deferred_issues:
    - "LockedSource symbolic-origin fields not persisted (acceptance marked 'optional'; no behavioral impact)"
    - "source_matches re-resolves remote vs the resolve_sources map (negligible vs git I/O)"
    - "builtin_forges() rebuilt per call (micro-opt; LazyLock candidate)"
    - "resolved_remote error labels source by path; sync wraps with the real name"
    - "ParsedSource runtime git-XOR-host+path invariant (enum candidate)"
    - "NormalizedUrl split_once('@') edge — unreachable today"
  recommendation: ready_to_merge
readiness:
  all_batches_reviewed: true
  critical_issues_resolved: true
  high_issues_resolved: true
  final_review_passed: true
  tests_passing: true   # 408 lib + 5 integration, clippy clean
