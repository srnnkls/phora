# I think this is not needed anymore, we just want to manage artifacts
# as packages
# artifacts = ["skills", "commands", "agents"]

# Is this the right shape? The mapping should
# declare the source and the default target,
# I will state a revised version below
# [manifest]
# skills = ["code-review", "debug-helper"]
# commands = ["deploy", "test"]
# agents = ["reviewer"]
# version = "1.0.0"

[manifest]
version = "1.0.0"
[manifest.artifacts]
skills = { path = ".claude/skills", target_path = "skills" }
commands = { path = ".claude/plugins/commander/comandas", target_path = "commands" }
resources = "resources" # string -> string is a convencience alias for: resources = { path = "resources", target_path = "resources" }

# Sources (packages you depend on)
# `phora add https://github.com/company/shared-agents/skills` becomes`
[sources.shared_agents]
host = "github.com"
repo = "company/shared-agents"
ref = "dev"
# should also be possible like cargo (valdidated b/c mutuallualy exclusive)
# branch = ...
# tag = ...
path = "skills"
target_path = ".claude/skills"

# `phora add username/dotfiles` defaults to github backend
[sources.dotfiles]
host = "github.com"
repo = "username/dotfiles/"
# all of the following are defaults
# ref = "main"
# path = "" # fetches whatever manifest defines => default: full repo
# tag = ""
# branch = ""
# target_path = "" # puts wherever manifest defines => default: cwd

