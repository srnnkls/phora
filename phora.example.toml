version = 1

# Host templates expand `add` shorthands (`owner/repo`) and supply auth.
# `github` and `gitlab` are built in; add others here.
[hosts.github]
git_url = "https://github.com/{owner}/{repo}.git"
auth = { type = "token", env = "GITHUB_TOKEN" }

[hosts.company]
git_url = "ssh://git@git.company.com/{owner}/{repo}.git"
auth = { type = "ssh", key = "~/.ssh/id_ed25519" }

# A source is a git repo. Top-level directories under `root` are its artifacts.
# Pin with exactly one of branch / tag / rev (defaults to branch `main`).
[sources.dotfiles]
git = "https://github.com/me/dotfiles.git"
branch = "main"
root = "modules"

[sources.company-configs]
git = "https://github.com/company/shared-configs.git"
tag = "v2.1"
root = "configs"
include = ["editor", "lint"]
exclude = ["**/test/**", "**/*.bak"]

[sources.loqui]
git = "https://github.com/srnnkls/loqui.git"
rev = "9f1c2ab"
root = "languages"
allow_symlinks = false
preserve_executable = true
# For a local dev loop, override this source onto a local checkout and live-link
# it via `deploy = "link"` — local-overlay-only. See phora.local.example.toml.

# A target is a directory artifacts are projected into. Omit `sources` to take all.
[targets.neovim]
path = "~/.config/nvim"
sources = ["dotfiles"]

[targets.vscode]
path = "~/.config/Code/User"
sources = ["dotfiles", "company-configs"]
layout = "flat"

[targets.policies]
path = "~/.cupcake/policies/claude"
sources = ["loqui"]
layout = { type = "prefixed", separator = "/" }
