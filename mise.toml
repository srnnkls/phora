[tools]
rust = { version = "1.96.0", profile = "default" }   # pinned; default profile ships clippy+rustfmt (mise's rustup default is minimal)
"github:facebookincubator/scrut" = "0.4.3"   # deliberate one-minor bump over fas's 0.4.2
hk = { version = "1.47.0", postinstall = "hk install --mise", depends = ["pkl"] }
pkl = "0.31.0"
actionlint = "1.7.12"
git-cliff = "2.13.1"
cargo-dist = "0.32.0"
release-plz = "0.3.159"

[tasks.build]
run = "cargo build"

[tasks.test]
run = "cargo test"

[tasks.lint]
description = "clippy (pedantic, warnings as errors) + rustfmt check"
run = ["cargo clippy --all-targets -- -D warnings", "cargo fmt --check"]

[tasks.fmt]
run = "cargo fmt"

[tasks.bench]
description = "Criterion benchmarks (parallel-resolve speedup)"
run = "cargo bench --features bench"

[tasks.check]
depends = ["lint", "test"]

[tasks.test-integration]
description = "Run scrut end-to-end CLI suites (one process per doc, in parallel)"
# Each scrut case isolates HOME/XDG under its own temp dir, so docs run in
# parallel safely. xargs exits 123 if any doc fails, so the task still fails.
run = [
  "cargo build --release",
  "test -x target/release/phora || { echo 'phora release binary missing (custom CARGO_TARGET_DIR?)'; exit 1; }",
  "export PATH=\"$PWD/target/release:$PATH\"; printf '%s\\n' tests/scrut/*.md | xargs -P0 -n1 scrut test",
]
