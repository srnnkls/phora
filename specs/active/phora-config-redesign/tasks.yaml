phases:
  - name: "Phase 1: Config Format"
    task_ids: [CFG-001, CFG-002, CFG-004]
    checkpoint:
      description: New config format parses correctly
      criteria:
        - Source struct has git field with full URL
        - branch/tag/rev are mutually exclusive
        - Tests pass
      verified: false

  - name: "Phase 2: Manifest"
    task_ids: [CFG-005, CFG-006]
    checkpoint:
      description: Manifest filters exports correctly
      criteria:
        - artifacts field filters directories
        - No path rewriting
      verified: false

  - name: "Phase 3: Lock File"
    task_ids: [CFG-007, CFG-008, CFG-009]
    checkpoint:
      description: Lock file supports lazy sync
      criteria:
        - digest computed and stored
        - Per-file hashes recorded
        - Unchanged config skips fetch
      verified: false

  - name: "Phase 4: URL Parser"
    task_ids: [CFG-010, CFG-011, CFG-018]
    checkpoint:
      description: phora add parses GitHub URLs and filters work
      criteria:
        - Shorthand owner/repo/path works
        - Full tree/ref/path URLs work
        - GitLab URLs work
        - Source name collision detected
        - Include/exclude glob filtering works
      verified: false

  - name: "Phase 5: Consolidation"
    task_ids: [CFG-012, CFG-013, CFG-014]
    checkpoint:
      description: Single unified implementation
      criteria:
        - Config types consolidated
        - Lockfile types consolidated
        - Old internal packages deprecated
        - All tests pass
      verified: false

  - name: "Phase 6: Commands"
    task_ids: [CFG-015, CFG-016, CFG-017]
    checkpoint:
      description: CLI commands complete
      criteria:
        - phora update re-resolves refs and updates lock
        - phora sync detects drift and errors without --force
        - phora add CLI contract documented
      verified: false
