phases:
  - name: "Phase 1: Config Schema"
    task_ids: [TGT-001, TGT-002, TGT-003, TGT-004]
    checkpoint:
      description: Config parses with new targets schema
      criteria:
        - Source.Root replaces Source.Path
        - Source.Target removed
        - Target struct with Path, Mode, Sources
        - Config.Targets map works
        - Validation catches undefined source references
      verified: false

  - name: "Phase 2: Cache Structure"
    task_ids: [TGT-005, TGT-006]
    checkpoint:
      description: Cache uses content-addressable structure
      criteria:
        - Cache at ~/.phora/cache/<source>/<commit>/
        - Fetch populates new cache location
      verified: false

  - name: "Phase 3: Symlink/Copy"
    task_ids: [TGT-007, TGT-008, TGT-009]
    checkpoint:
      description: Both deployment modes work
      criteria:
        - Symlink mode creates per-artifact symlinks
        - Copy mode copies files
        - Tilde expansion works in Target.Path
      verified: false

  - name: "Phase 4: Sync Logic"
    task_ids: [TGT-010, TGT-011, TGT-012]
    checkpoint:
      description: Target-driven sync deploys from resolved sources
      criteria:
        - Targets resolve their source list
        - nil sources = all sources
        - Drift detected for symlinks
        - Lock file tracks target deployments
      verified: false

  - name: "Phase 5: CLI"
    task_ids: [TGT-013, TGT-014]
    checkpoint:
      description: CLI supports target filtering
      criteria:
        - --target flag filters sync
        - Output shows per-target results
      verified: false

  - name: "Phase 6: Platform & Edge Cases"
    task_ids: [TGT-015, TGT-016, TGT-017, TGT-018]
    checkpoint:
      description: Platform edge cases handled
      criteria:
        - Symlink failure warns with copy suggestion
        - --copy flag overrides mode per-invocation
        - phora status detects cache mutations
        - phora vendor converts symlink to editable copy
      verified: false

  - name: "Phase 7: Remove Henia Packages"
    task_ids: [TGT-019, TGT-020, TGT-021, TGT-022, TGT-023, TGT-024, TGT-025]
    checkpoint:
      description: All henia-only internal packages removed
      criteria:
        - internal/transform removed
        - internal/reference removed
        - internal/target removed
        - internal/defaults removed
        - internal/manifest removed
        - internal/config removed (deprecated)
        - internal/lockfile removed (deprecated)
      verified: false

  - name: "Phase 8: Remove Henia CLI and Config Fields"
    task_ids: [TGT-026, TGT-027, TGT-028, TGT-029]
    checkpoint:
      description: Zero henia/harness references in codebase
      criteria:
        - deploy and init commands removed
        - Harness struct and all fields removed from root config
        - pathmap.go removed
        - grep -ri 'harness\|henia\|rewrite\|deploy.*henia\|GenerateCommands' returns zero Go hits
