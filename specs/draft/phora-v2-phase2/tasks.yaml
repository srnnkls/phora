    checkpoint:
      description: Source struct updated
      criteria:
        - Include/Exclude fields on Source
        - Config parsing works
      verified: false

  - name: "Phase B: Source Filtering"
    task_ids: [PH2-002, PH2-003, PH2-004]
    checkpoint:
      description: Source-level filtering works
      criteria:
        - LocalSource filters artifacts via constructor params
        - RepoSource filters artifacts via constructor params
        - Glob patterns matched against artifact.Name
      verified: false

