default_harnesses = ["claude"]
default_artifacts = ["skills", "commands", "agents"]

# Claude Code - Anthropic's CLI
# Structure: nested (skills/name/SKILL.md)
# Docs: https://docs.anthropic.com/en/docs/claude-code
[harness.claude]
path = "~/.claude"
structure = "nested"

[harness.claude.variables]
model_strong = "opus"
model_normal = "sonnet"
model_weak = "haiku"

[harness.claude.tools]
bash = "Bash"
read = "Read"
write = "Write"
edit = "Edit"
glob = "Glob"
grep = "Grep"
task = "Task"

[harness.claude.references.skill]
output = "/{{.Name}}"

[harness.claude.references.command]
output = "/{{.Name}}"

[harness.claude.references.agent]
output = "@{{.Name}}"

# OpenCode
# Structure: flat (skills/name.md)
# Docs: https://opencode.ai/docs/
[harness.opencode]
path = "~/.opencode"
structure = "flat"
generate_commands_from_skills = true

[harness.opencode.keys]
allowed_tools = "tools"

[harness.opencode.tools]
bash = "bash"
read = "read"
write = "write"
edit = "edit"
glob = "glob"
grep = "grep"

[harness.opencode.references.skill]
output = "@{{.Name}}"

[harness.opencode.references.command]
output = "/{{.Name}}"

[harness.opencode.references.agent]
output = "@{{.Name}}"

[harness.opencode.variables]
model_strong = "anthropic/claude-sonnet-4-5"
model_normal = "anthropic/claude-sonnet-4-5"
model_weak = "anthropic/claude-haiku-4-5"

