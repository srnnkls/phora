name: release-plz

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: jdx/mise-action@v2
        with:
          experimental: true
          install: true
          install_args: rust
          cache: true
      - uses: release-plz/action@476794ede164c5137bfc3a1dc6ed3675275690f9 # v0.5.99
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version tag
      actions: write # gh workflow run dispatches cargo-dist's release.yml under GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: jdx/mise-action@v2
        with:
          experimental: true
          install: true
          install_args: rust
          cache: true
      - name: release
        id: release
        uses: release-plz/action@476794ede164c5137bfc3a1dc6ed3675275690f9 # v0.5.99
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: dispatch cargo-dist release
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ fromJSON(steps.release.outputs.releases)[0].tag }}
        run: gh workflow run release.yml --ref "$TAG" -f tag="$TAG"
