name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
          install: true
          # scrut/hk/pkl ship no windows asset; scope the install to rust so
          # the windows runner can't fail on a missing POSIX-only binary.
          install_args: rust
          cache: true
      - uses: Swatinem/rust-cache@v2
      # mise caches the toolchain but not its rustup components; add them every
      # run so a cache hit can't leave clippy/rustfmt missing (idempotent).
      - run: mise exec -- rustup component add clippy rustfmt
      - run: mise run lint
      - run: mise run test

  integration:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # scrut suite is POSIX-only sh; no windows runner.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
          install: true
          cache: true
      - uses: Swatinem/rust-cache@v2
      - run: mise run test-integration
