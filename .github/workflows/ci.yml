name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ubuntu-latest only. macOS is deferred: xdg-base-dirs adds a macOS-specific
# state fallback (~/Library/Application Support) that stays E2E-uncovered
# until a macOS runner is added here.
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
          install: true
          cache: true
      - uses: Swatinem/rust-cache@v2
      # mise caches the toolchain but not its rustup components; add them every
      # run so a cache hit can't leave clippy/rustfmt missing (idempotent).
      - run: mise exec -- rustup component add clippy rustfmt
      - run: mise run lint
      - run: mise run test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
          install: true
          cache: true
      - uses: Swatinem/rust-cache@v2
      - run: mise run test-integration
